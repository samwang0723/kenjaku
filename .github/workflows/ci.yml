name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kenjaku-${{ matrix.toolchain }}

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev curl

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # 3d.2 guardrail: static analysis catches tenant-scope regressions
      # (H2-class leaks) before review. Runs before build/test so a rule
      # violation fails fast on the cheapest step.
      - name: Install semgrep
        run: |
          python3 -m pip install --user 'semgrep==1.156.0'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Semgrep (tenant-scope rule)
        run: |
          semgrep \
            --config .semgrep/tenant-scope.yml \
            --error \
            --strict \
            --metrics=off \
            crates/kenjaku-infra/src/postgres/

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose file
        run: docker compose config -q

      - name: Build kenjaku image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: kenjaku:ci
          cache-from: type=gha,scope=kenjaku
          cache-to: type=gha,scope=kenjaku,mode=max

      - name: Build geto-web image
        uses: docker/build-push-action@v6
        with:
          context: ./geto-web
          file: ./geto-web/Dockerfile
          push: false
          load: true
          tags: kenjaku-geto-web:ci
          cache-from: type=gha,scope=geto-web
          cache-to: type=gha,scope=geto-web,mode=max
