# Copy to secrets.local.yaml and fill in real values.
# secrets.*.yaml files are gitignored — never commit them.

postgres:
  url: "postgres://kenjaku:changeme@localhost:5432/kenjaku"

embedding:
  api_key: "sk-your-openai-api-key"

llm:
  api_key: "your-gemini-api-key"

contextualizer:
  api_key: "sk-ant-your-anthropic-api-key"

# Optional — replaces Gemini's non-functional built-in google_search
# with a real web tier. Sign up at https://api-dashboard.search.brave.com/
# Free tier: 2000 queries/month.
web_search:
  enabled: false
  api_key: "BSA-your-brave-search-api-key"

# ── Dev JWT Setup ──────────────────────────────────────────────────
#
# Tenancy is always on. Every request needs a valid JWT.
#
# For local development:
#   1. Run `make dev-setup` (generates keypair + mints token)
#   2. config/local.yaml already points at config/dev/public.pem
#   3. Token is auto-loaded by geto-web from .dev-token (localhost only;
#      nginx blocks non-local access to /.dev-token)
#
# For production:
#   - Set tenancy.jwt.public_key_path to your real public key
#   - Set tenancy.jwt.issuer / audience to match your auth service
#   - Provision keys via your secrets manager, not this file
