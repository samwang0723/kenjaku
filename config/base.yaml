server:
  host: "0.0.0.0"
  port: 8080

qdrant:
  url: "http://localhost:6334"
  collection_name: "documents"
  vector_size: 1536

postgres:
  max_connections: 10

redis: {}

embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536
  batch_size: 100

llm:
  provider: "gemini"
  model: "gemini-3.1-flash-lite-preview"
  max_tokens: 2048
  temperature: 0.8

contextualizer:
  provider: "anthropic"
  model: "claude-haiku-4-5"

trending:
  popularity_threshold: 5
  flush_interval_secs: 300
  daily_ttl_secs: 172800
  weekly_ttl_secs: 1209600
  # Minimum search_count required for a query to surface in autocomplete
  # or top-searches. Defends against gibberish that slipped past the
  # record-time guard — anything junk still needs independent repeated
  # searches before reaching users.
  crowd_sourcing_min_count: 2

chunking:
  chunk_size: 800      # tokens (cl100k_base), ~10% of embedding context
  chunk_overlap: 100   # tokens (~12.5% overlap)

search:
  semantic_weight: 0.8
  bm25_weight: 0.2
  over_retrieve_factor: 10
  suggestion_count: 3
  component_layout:
    order:
      - llm_answer
      - sources
      - suggestions

default_suggestions:
  enabled: true
  refresh:
    schedule_cron: "0 3 * * *"
    sample_cap: 2000
    cluster_count: 20
    per_cluster: 5
    retention_batches: 3
    generation_timeout_ms: 8000
    advisory_lock_id: 427318
  safety_regex: '(?i)(price|should i (buy|sell)|will .* hit|prediction|forecast)'
  default_weight: 10
  pool_cap: 50

locale_memory:
  enabled: true
  ttl_seconds: 7200
  key_prefix: "sl:"

telemetry:
  service_name: "kenjaku"
  log_level: "info"
