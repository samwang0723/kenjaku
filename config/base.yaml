server:
  host: "0.0.0.0"
  port: 8080
  rate_limit_per_second: 1
  rate_limit_burst: 60
  body_limit_bytes: 65536     # 64 KB
  request_timeout_secs: 30

qdrant:
  url: "http://localhost:6334"
  collection_name: "documents"
  vector_size: 1536

postgres:
  max_connections: 10

redis: {}

embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  base_url: "https://api.openai.com/v1"
  dimensions: 1536
  batch_size: 100

llm:
  provider: "gemini"
  model: "gemini-3.1-flash-lite-preview"
  base_url: "https://generativelanguage.googleapis.com/v1beta"
  max_tokens: 1024
  temperature: 0.8
  service_tier: standard  # standard | flex (50% cheaper) | priority (75% more)

contextualizer:
  provider: "anthropic"
  model: "claude-haiku-4-5"
  base_url: "https://api.anthropic.com/v1"

trending:
  popularity_threshold: 5
  flush_interval_secs: 300
  daily_ttl_secs: 172800
  weekly_ttl_secs: 1209600
  # Minimum search_count required for a query to surface in autocomplete
  # or top-searches. Defends against gibberish that slipped past the
  # record-time guard — anything junk still needs independent repeated
  # searches before reaching users.
  crowd_sourcing_min_count: 2

chunking:
  chunk_size: 800 # tokens (cl100k_base), ~10% of embedding context
  chunk_overlap: 100 # tokens (~12.5% overlap)

search:
  semantic_weight: 0.8
  bm25_weight: 0.2
  over_retrieve_factor: 10
  suggestion_count: 3
  component_layout:
    order:
      - llm_answer
      - sources
      - suggestions
  history:
    enabled: true
    max_turns_per_session: 10
    inject_max_turns: 6
    session_idle_ttl_seconds: 3600

default_suggestions:
  enabled: true
  refresh:
    schedule_cron: "0 0 3 * * *"  # 6-field: sec min hour day month weekday
    sample_cap: 2000
    cluster_count: 20
    per_cluster: 5
    retention_batches: 3
    generation_timeout_ms: 8000
    advisory_lock_id: 427318
  safety_regex: '(?i)(\bprice\b|should[\s\-]?i[\s\-]?(buy|sell|invest)|will[\s\w]+hit|\bprediction\b|\bforecast\b|\bpredicted\b|\bpurchase\b|\binvesting\b|\bbuying\b|where[\s\w]+buy)'
  default_weight: 10
  pool_cap: 50

web_search:
  enabled: false
  provider: brave
  base_url: "https://api.search.brave.com/res/v1/web/search"
  limit: 5
  timeout_ms: 4000
  fallback_min_chunks: 2
  # Fires when any pattern matches the translated query. Defaults cover
  # real-time keywords + domain keywords that are almost always fresh.
  trigger_patterns:
    - "(?i)\\b(today|tonight|now|current|currently|latest|recent|this (week|month|year)|yesterday|live|real[- ]?time)\\b"
    - "(?i)\\b(price|market|news|weather|score|forecast|trending|happening|update|stocks?|crypto(currency)?)\\b"

locale_memory:
  enabled: true
  ttl_seconds: 7200
  key_prefix: "sl:"

telemetry:
  service_name: "kenjaku"
  log_level: "info"

# Multi-tenancy (Phase 3e — always on, no disabled mode).
#
# Every request goes through JWT auth. `validate_secrets()` fails fast
# at startup if `tenancy.jwt.*` fields are missing. Dev environments
# provision a keypair via `make dev-setup`; production reads the key
# from `secrets.{APP_ENV}.yaml`.
tenancy:
  collection_name_template: "{base}_{tenant}"

# Rate-limit key strategy (Phase 3c.2). `ip` is the default — uses
# client IP only. `tenant_ip` or `tenant_principal_ip` incorporate the
# tenant context for per-tenant rate limiting. The strategy reads
# `TenantContext` from request extensions (always available post-3e
# since tenancy is always-on).
#
# NOTE — `plan_*_per_second` fields below are **reserved for a
# follow-up slice** and NOT currently consumed by the governor. Active
# bucket sizing still comes from `server.rate_limit_per_second` +
# `server.rate_limit_burst`. Setting these values today has no runtime
# effect; we keep the YAML shape stable so operators can wire it up
# later without a config migration.
rate_limit:
  key_strategy: "ip"
  plan_free_per_second: 1          # reserved — not yet enforced
  plan_pro_per_second: 4           # reserved — not yet enforced
  plan_enterprise_per_second: 100  # reserved — not yet enforced
