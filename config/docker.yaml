server:
  host: "0.0.0.0"
  port: 8080

qdrant:
  url: "http://qdrant:6334"

redis:
  url: "redis://redis:6379"

telemetry:
  service_name: "kenjaku"
  otlp_endpoint: "http://otel-collector:4317"
  log_level: "kenjaku_infra=debug,info"

# Phase 3e: tenancy is always on. Dev keypair mounted from host.
tenancy:
  jwt:
    issuer: "kenjaku-dev"
    audience: "kenjaku-api"
    public_key_path: "/app/config/dev/public.pem"

# Phase A merged-preamble experiment. Flip to parallel_preamble to revert.
# See PR #27 for design + smoke-test gate results.
pipeline:
  preamble_mode: merged_preamble
