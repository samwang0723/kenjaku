services:
  kenjaku:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18080:8080"
    environment:
      APP_ENV: docker
    volumes:
      # Mount secrets at runtime — never baked into the image
      - ./config/secrets.docker.yaml:/app/config/secrets.docker.yaml:ro
      # Dev keypair for JWT auth (generated by `make dev-setup`)
      - ./config/dev:/app/config/dev:ro
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "ls /proc/1/status || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5

  postgres:
    image: postgres:17-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: kenjaku
      POSTGRES_PASSWORD: kenjaku
      POSTGRES_DB: kenjaku
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kenjaku"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  geto-web:
    build:
      context: ./geto-web
      dockerfile: Dockerfile
    ports:
      # Bind to loopback only — LAN devices must not reach the dev UI.
      # cloudflared (same compose network) still proxies via the docker
      # bridge, so the public tunnel keeps working.
      - "127.0.0.1:3000:80"
    volumes:
      # Mount dev-token at runtime (gitignored, never baked into the image).
      # Long-form `bind` with create_host_path: false — if the file is
      # missing Docker refuses to start this service instead of silently
      # creating a directory (which nginx would then serve as a 403).
      # nginx config further restricts this path to loopback + docker bridge,
      # so production deployments without the mount get a clean 404.
      - type: bind
        source: ./config/dev/dev-token.txt
        target: /usr/share/nginx/html/.dev-token
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      kenjaku:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      geto-web:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]

volumes:
  qdrant_data:
  pg_data:
  redis_data:
