<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Kenjaku Local AI</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="phone-frame">
    <div class="notch"></div>
    <div class="app">
      <header class="header">
        <button class="header-back-btn" id="backBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
        </button>
        <div class="header-title" id="headerTitle">
          <span class="header-sparkle"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 10 10" shape-rendering="crispEdges"><path fill="#D87B97" d="M2 0h6v1h-6zM1 1h1v1h-1zM4 1h2v1h-2zM8 1h1v1h-1zM0 2h1v1h-1zM4 2h2v1h-2zM9 2h1v1h-1zM0 3h1v1h-1zM2 3h1v1h-1zM4 3h2v1h-2zM7 3h1v1h-1zM9 3h1v1h-1zM0 4h1v1h-1zM4 4h2v1h-2zM9 4h1v1h-1zM0 5h1v1h-1zM3 5h4v1h-4zM9 5h1v1h-1zM0 6h1v1h-1zM4 6h2v1h-2zM9 6h1v1h-1zM0 7h1v1h-1zM2 7h1v1h-1zM4 7h2v1h-2zM7 7h1v1h-1zM9 7h1v1h-1zM1 8h1v1h-1zM4 8h2v1h-2zM8 8h1v1h-1zM2 9h6v1h-6z"/><path fill="#FAD0DC" d="M2 1h2v1h-2zM6 1h2v1h-2zM1 2h3v1h-3zM6 2h3v1h-3zM1 3h1v1h-1zM3 3h1v1h-1zM6 3h1v1h-1zM8 3h1v1h-1zM1 4h3v1h-3zM6 4h3v1h-3zM1 5h2v1h-2zM7 5h2v1h-2zM1 6h3v1h-3zM6 6h3v1h-3zM1 7h1v1h-1zM3 7h1v1h-1zM6 7h1v1h-1zM8 7h1v1h-1zM2 8h2v1h-2zM6 8h2v1h-2z"/></svg></span> Kenjaku AI <span id="envLabel">Local</span>
          <select id="envSelect" class="env-select">
            <option value="local" selected>Local</option>
            <option value="staging">Staging</option>
            <option value="production">Production</option>
          </select>
        </div>
        <div style="width:36px"></div>
      </header>
      <div class="progress-bar" id="progressBar"></div>

      <div class="scroll-area" id="scrollArea">
        <!-- Initial search view -->
        <div id="searchView" class="search-view">
          <div class="search-greeting">What can I help you with?</div>
          <div class="pills-label"><span class="pills-label-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 10 10" shape-rendering="crispEdges"><path fill="#D87B97" d="M2 0h6v1h-6zM1 1h1v1h-1zM4 1h2v1h-2zM8 1h1v1h-1zM0 2h1v1h-1zM4 2h2v1h-2zM9 2h1v1h-1zM0 3h1v1h-1zM2 3h1v1h-1zM4 3h2v1h-2zM7 3h1v1h-1zM9 3h1v1h-1zM0 4h1v1h-1zM4 4h2v1h-2zM9 4h1v1h-1zM0 5h1v1h-1zM3 5h4v1h-4zM9 5h1v1h-1zM0 6h1v1h-1zM4 6h2v1h-2zM9 6h1v1h-1zM0 7h1v1h-1zM2 7h1v1h-1zM4 7h2v1h-2zM7 7h1v1h-1zM9 7h1v1h-1zM1 8h1v1h-1zM4 8h2v1h-2zM8 8h1v1h-1zM2 9h6v1h-6z"/><path fill="#FAD0DC" d="M2 1h2v1h-2zM6 1h2v1h-2zM1 2h3v1h-3zM6 2h3v1h-3zM1 3h1v1h-1zM3 3h1v1h-1zM6 3h1v1h-1zM8 3h1v1h-1zM1 4h3v1h-3zM6 4h3v1h-3zM1 5h2v1h-2zM7 5h2v1h-2zM1 6h3v1h-3zM6 6h3v1h-3zM1 7h1v1h-1zM3 7h1v1h-1zM6 7h1v1h-1zM8 7h1v1h-1zM2 8h2v1h-2zM6 8h2v1h-2z"/></svg></span> Top searches</div>
          <div class="pills" id="pills"></div>
        </div>

        <!-- Results view (hidden initially) -->
        <div id="resultsView" class="results-view" style="display:none">
          <div class="query-echo" id="queryEcho"></div>
          <div class="search-status" id="searchStatus" style="display:none">
            <span class="status-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Searching
          </div>
          <div id="results" class="results"></div>
          <details id="debugInfo" class="debug-info" style="display:none">
            <summary class="debug-summary">Debug</summary>
            <div class="debug-tags" id="debugTags"></div>
            <div class="debug-ids" id="debugIds"></div>
          </details>
        </div>
      </div>

      <!-- Fixed bottom bar -->
      <div class="bottom-bar">
        <div class="search-input-wrap">
          <input type="text" id="searchInput" placeholder="Ask a follow-up" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="autoCompleteDropdown" aria-autocomplete="list">
          <button id="searchBtn" type="button" class="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 19V5M5 12l7-7 7 7" />
            </svg>
          </button>
        </div>
        <div id="autoCompleteDropdown" class="autocomplete-dropdown" role="listbox" aria-label="Search suggestions"></div>
      </div>
    </div>
  </div>

  <details class="debug-panel debug-auth-panel" id="authPanel">
    <summary>Debug: Auth Token (staging/production)</summary>
    <div class="debug-context-grid">
      <label>Bearer Token<input type="password" id="bearerToken" placeholder="Paste token for non-local environments" autocomplete="off"></label>
    </div>
  </details>

  <details class="debug-panel debug-context-panel">
    <summary>Debug: User Context <button type="button" id="resetContextBtn" class="debug-reset-btn">Reset</button></summary>
    <div class="debug-context-grid">
      <label>preferred_locale<select id="ctxLocale">
          <option value="en" selected>en</option>
          <option value="zh">zh</option>
          <option value="zh-TW">zh-TW</option>
          <option value="fr">fr</option>
          <option value="es">es</option>
          <option value="de">de</option>
          <option value="ja">ja</option>
          <option value="ko">ko</option>
        </select></label>
    </div>
  </details>

  <details class="debug-panel">
    <summary>Debug: Raw JSON</summary>
    <pre id="rawJson"></pre>
  </details>

  <script src="app.js"></script>
</body>

</html>
