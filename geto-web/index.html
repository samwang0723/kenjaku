<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Kenjaku Local AI</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="phone-frame">
    <div class="notch"></div>
    <div class="app">
      <header class="header">
        <button class="header-back-btn" id="backBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
        </button>
        <div class="header-title" id="headerTitle">
          <div class="header-title-row">
            <span class="header-sparkle"><img src="enso.svg" alt="" width="18" height="18" style="display:block"></span> <span data-i18n="app_title">Kenjaku AI</span>
          </div>
          <div class="header-pills-row">
            <span class="env-pill">
              <span id="envLabel">Local</span>
              <select id="envSelect" class="env-select">
                <option value="local" selected>Local</option>
                <option value="staging">Staging</option>
                <option value="production">Production</option>
              </select>
            </span>
            <span class="env-pill env-pill-locale">
              <span id="localeLabel">Auto</span>
              <select id="localeSwitcher" class="env-select" aria-label="Language">
                <option value="">Auto</option>
                <option value="en">English</option>
                <option value="zh">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
              </select>
            </span>
          </div>
        </div>
        <!-- auth-login-rbac: gear button mirrors the back-btn shape
             on the right side. Shown only when role=admin. -->
        <button id="adminGearBtn" class="header-back-btn header-gear-btn" type="button" style="visibility:hidden" aria-label="Team settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </header>
      <div class="progress-bar" id="progressBar"></div>

      <div class="scroll-area" id="scrollArea">
        <!-- Initial search view -->
        <div id="searchView" class="search-view">
          <div class="search-greeting" data-i18n="search_greeting">What can I help you with?</div>
          <div class="pills-label"><span class="pills-label-icon"><img src="enso.svg" alt="" width="18" height="18" style="display:block"></span> <span data-i18n="top_searches">Top searches</span></div>
          <div class="pills" id="pills"></div>
        </div>

        <!-- Results view (hidden initially) -->
        <div id="resultsView" class="results-view" style="display:none">
          <div class="query-echo" id="queryEcho"></div>
          <div class="search-status" id="searchStatus" style="display:none">
            <span class="status-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> <span data-i18n="searching">Searching</span>
          </div>
          <div id="results" class="results"></div>
          <details id="debugInfo" class="debug-info" style="display:none">
            <summary class="debug-summary" data-i18n="debug">Debug</summary>
            <div class="debug-tags" id="debugTags"></div>
            <div class="debug-ids" id="debugIds"></div>
          </details>
        </div>

        <!-- Login view (auth-login-rbac) -->
        <div id="loginView" class="login-view" style="display:none">
          <div class="login-title" data-i18n="login_title">Sign in</div>
          <form id="loginForm" class="login-form" autocomplete="on">
            <label class="login-field">
              <span data-i18n="login_email">Email</span>
              <input type="email" id="loginEmail" autocomplete="username" required>
            </label>
            <label class="login-field">
              <span data-i18n="login_password">Password</span>
              <input type="password" id="loginPassword" autocomplete="current-password" required>
            </label>
            <button type="submit" class="login-submit" data-i18n="login_submit">Sign in</button>
            <div id="loginError" class="login-error" role="alert"></div>
          </form>
        </div>

        <!-- Admin view (auth-login-rbac) — gated by role=admin -->
        <div id="adminView" class="admin-view" style="display:none">
          <section class="admin-section">
            <div class="admin-section-title" data-i18n="invite_employee">Invite employee</div>
            <form id="inviteForm" class="invite-form">
              <label class="login-field">
                <span data-i18n="invite_email">Email</span>
                <input type="email" id="inviteEmail" required>
              </label>
              <div class="login-field">
                <span data-i18n="invite_role">Role</span>
                <div class="role-seg" id="inviteRole" role="radiogroup" aria-label="Role">
                  <button type="button" class="role-seg-opt is-active" data-value="member" role="radio" aria-checked="true"><span data-i18n="role_member">Member</span></button>
                  <button type="button" class="role-seg-opt" data-value="admin" role="radio" aria-checked="false"><span data-i18n="role_admin">Admin</span></button>
                </div>
              </div>
              <label class="login-field">
                <span data-i18n="invite_password">Password (min 12 chars)</span>
                <input type="password" id="invitePassword" autocomplete="new-password" minlength="12" required>
              </label>
              <button type="submit" class="login-submit" data-i18n="invite_submit">Send invite</button>
              <div id="inviteStatus" class="login-error" role="status"></div>
            </form>
          </section>
          <section class="admin-section">
            <div class="admin-section-title" data-i18n="team_title">Team</div>
            <div id="teamList" class="team-list"></div>
          </section>
          <section class="admin-section">
            <div class="admin-section-title" data-i18n="tenant_info">Your tenant</div>
            <div id="tenantInfo" class="tenant-info"></div>
          </section>
        </div>
      </div>

      <!-- Fixed bottom bar -->
      <div class="bottom-bar">
        <div class="search-input-wrap">
          <textarea id="searchInput" rows="1" maxlength="500" data-i18n-placeholder="ask_followup" placeholder="Ask a follow-up" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="autoCompleteDropdown" aria-autocomplete="list"></textarea>
          <button id="searchBtn" type="button" class="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 19V5M5 12l7-7 7 7" />
            </svg>
          </button>
        </div>
        <div class="input-meta">
          <span id="charCounter" class="char-counter">0 / 500</span>
        </div>
        <div id="autoCompleteDropdown" class="autocomplete-dropdown" role="listbox" aria-label="Search suggestions"></div>
      </div>
    </div>
  </div>

  <!-- auth-login-rbac: preserve bearerToken hidden input so existing
       getAuthHeaders() wiring keeps working. Replaced the visible
       debug textarea with a sign-out button. -->
  <input type="hidden" id="bearerToken" autocomplete="off">
  <div class="signout-row" id="signoutRow" style="display:none">
    <button id="signoutBtn" type="button" class="signout-btn" data-i18n="sign_out">Sign out</button>
  </div>

  <details class="debug-panel">
    <summary data-i18n="debug_raw_json">Debug: Raw JSON</summary>
    <pre id="rawJson"></pre>
  </details>

  <script src="app.js"></script>
</body>

</html>
