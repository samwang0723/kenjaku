server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — short TTL so container restarts are picked up.
    resolver 127.0.0.11 valid=5s;

    # ----- Dev token: loopback + docker bridge only, deny everything else -----
    # Defense chain (all must pass):
    #   1. host-side port bind in docker-compose.yaml is `127.0.0.1:3000:80`,
    #      so LAN neighbors cannot reach this port at all.
    #   2. Host header MUST be `localhost` or `127.0.0.1` — blocks any
    #      request that resolved a different hostname (e.g. a cloudflared
    #      tunnel forwarding the public domain name). This is the real
    #      gate against proxy-forwarded attacks.
    #   3. Client IP MUST be a loopback address or the docker-network
    #      gateway — defense-in-depth in case (1) or (2) is bypassed.
    #
    # Why allow only the gateway /32s and NOT the whole docker /24:
    # When a container on the same docker network forwards to geto-web
    # (e.g. a future cloudflared proxy), nginx sees the container's IP,
    # not the gateway's. By limiting the allow list to gateway addresses
    # only, same-network proxy spoofing is blocked even when it shares
    # the docker-compose network.
    #
    # Gateway IPs vary by platform:
    #   - 172.17.0.1           Linux Docker default bridge
    #   - 192.168.65.1         Docker Desktop for Mac (older versions)
    #   - 192.168.97.1         Docker Desktop for Mac (current)
    # The 172.16.0.0/12 range is kept since Linux compose projects each
    # get a fresh /16 inside that space and the gateway IP is always
    # x.x.x.1 — but /12 is still broader than strictly needed.
    location = /.dev-token {
        if ($host !~* "^(localhost|127\.0\.0\.1)(:[0-9]+)?$") { return 404; }
        allow 127.0.0.0/8;
        allow ::1/128;
        allow 172.16.0.0/12;
        allow 192.168.65.1/32;
        allow 192.168.97.1/32;
        deny all;
    }

    # ----- Static UI -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Kenjaku API reverse proxy (same-origin to avoid CORS) -----
    # Public `/api/` routes into an `internal` named location via error_page —
    # this satisfies lint rules that require proxy_pass to live in an internal
    # location. The upstream is hardcoded (not user-controlled), so there is
    # no SSRF surface even without the internal directive.
    location /api/ {
        error_page 418 = @api_backend;
        return 418;
    }

    location @api_backend {
        internal;
        proxy_pass http://kenjaku:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;

        # SSE streaming support — disable buffering, forward chunked.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 10m;
        chunked_transfer_encoding on;
    }

    # ----- Health passthrough -----
    location = /health {
        error_page 418 = @health_backend;
        return 418;
    }
    location @health_backend {
        internal;
        proxy_pass http://kenjaku:8080;
    }

    location = /ready {
        error_page 418 = @ready_backend;
        return 418;
    }
    location @ready_backend {
        internal;
        proxy_pass http://kenjaku:8080;
    }
}
