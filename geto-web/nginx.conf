server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — short TTL so container restarts are picked up.
    resolver 127.0.0.11 valid=5s;

    # ----- Dev token: loopback + docker bridge only, deny everything else -----
    # Narrow allowlist on purpose:
    #   - 127.0.0.0/8 + ::1/128 → same-host curl / health checks
    #   - 172.16.0.0/12         → Docker default bridge gateway; when the host
    #                             publishes port 3000 the request appears to
    #                             come from the bridge, so we must allow it.
    # Deliberately NOT covered:
    #   - 10.0.0.0/8 and 192.168.0.0/16 — these overlap with LAN / VPN /
    #     cloudflared private-LB ranges. If cloudflared (or any proxy that
    #     sits on an RFC1918 address) forwards traffic here, $remote_addr is
    #     that proxy's IP, not the real client, so an IP allowlist alone is
    #     not safe for those ranges. Keep public deployments token-less.
    # Belt AND braces: also require Host: localhost or 127.0.0.1 so even if
    # a future proxy lands inside 172.16/12 it cannot reach this path unless
    # the client explicitly targeted localhost.
    location = /.dev-token {
        if ($host !~* "^(localhost|127\.0\.0\.1)(:[0-9]+)?$") { return 404; }
        allow 127.0.0.0/8;
        allow ::1/128;
        allow 172.16.0.0/12;
        deny all;
    }

    # ----- Static UI -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Kenjaku API reverse proxy (same-origin to avoid CORS) -----
    # Public `/api/` routes into an `internal` named location via error_page —
    # this satisfies lint rules that require proxy_pass to live in an internal
    # location. The upstream is hardcoded (not user-controlled), so there is
    # no SSRF surface even without the internal directive.
    location /api/ {
        error_page 418 = @api_backend;
        return 418;
    }

    location @api_backend {
        internal;
        proxy_pass http://kenjaku:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;

        # SSE streaming support — disable buffering, forward chunked.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 10m;
        chunked_transfer_encoding on;
    }

    # ----- Health passthrough -----
    location = /health {
        error_page 418 = @health_backend;
        return 418;
    }
    location @health_backend {
        internal;
        proxy_pass http://kenjaku:8080;
    }

    location = /ready {
        error_page 418 = @ready_backend;
        return 418;
    }
    location @ready_backend {
        internal;
        proxy_pass http://kenjaku:8080;
    }
}
